
apiVersion: v1
kind: Service
metadata:
    name: sdasd-service
    labels:
        app: sdasd
spec:
    type: NodePort
    selector:
        app: sdasd  # Replace with your application's label
    ports:
        - port: 8080        # The port your application listens on internally
          targetPort: 8080  # The port within the pod
          nodePort: 8080
          protocol: TCP
    