
apiVersion: v1
kind: Service
metadata:
    name: myschool-service
    labels:
        app: myschool
spec:
    type: NodePort
    selector:
        app: myschool  # Replace with your application's label
    ports:
        - port: 8080        # The port your application listens on internally
          targetPort: 8080  # The port within the pod
          nodePort: 3002
          protocol: TCP
    