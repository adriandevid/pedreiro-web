
apiVersion: v1
kind: Service
metadata:
    name: test2-service
    labels:
        app: test2
spec:
    type: NodePort
    selector:
        app: test2  # Replace with your application's label
    ports:
        - port: 8080        # The port your application listens on internally
          targetPort: 8080  # The port within the pod
          nodePort: 30005
          protocol: TCP
    