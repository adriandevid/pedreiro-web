
services:

#start dbBusiness
  dbBusiness: 
    image: postgres 
    container_name: dbBusiness 
    restart: always 
    ports: 
      - 5438:5432 
    volumes: 
      - /myschool/data:/var/lib/postgresql 

#end dbBusiness

#start registry
  registry: 
    image: registry:3 
    container_name: registry 
    restart: always 
    ports: 
      - 5000:5000 

#end registry

#start rabbitmq
  rabbitmq: 
    image: rabbitmq:4.0-management 
    container_name: rabbitmq 
    restart: always 
    ports: 
      - 5672:5672 
      - 15672:15672 

#end rabbitmq
#[content]
        
        
        
networks:
  web:
    external: false
